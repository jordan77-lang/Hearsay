<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HearSay</title>
    <link rel="stylesheet" href="../src/ui.css" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      import { mountApp } from "../src/ui.js";
      import {
        tryLoadRemoteDictionary,
        loadSupabaseConfig,
        getStoredCourseId,
      } from "../src/supabase/dictionary-remote.js";

      const config = await loadSupabaseConfig();
      const sync = await tryLoadRemoteDictionary(config, getStoredCourseId());
      mountApp(document.getElementById("app"), { dictionarySync: sync, supabaseConfig: config });
    </script>
  </body>
</html>
